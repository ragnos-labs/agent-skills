name: Docs Improvement
description: Suggest a README, install, or release note improvement
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: gap
    attributes:
      label: Documentation gap
      description: What was unclear, missing, or misleading?
    validations:
      required: true
  - type: textarea
    id: fix
    attributes:
      label: Suggested improvement
      description: What should the docs say instead?
    validations:
      required: true
