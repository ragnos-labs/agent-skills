name: Bug Report
description: Report an install issue, broken skill behavior, or incorrect docs
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Tell us what happened and which skill is affected.
    validations:
      required: true
  - type: input
    id: skill
    attributes:
      label: Skill
      placeholder: ship-core, ship-codex, or ship-claude
    validations:
      required: true
  - type: input
    id: agent
    attributes:
      label: Agent
      placeholder: codex, claude-code
    validations:
      required: true
  - type: textarea
    id: install-command
    attributes:
      label: Install command used
      render: shell
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
    validations:
      required: false
