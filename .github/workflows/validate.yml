name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate catalog
        run: python3 scripts/validate_catalog.py
