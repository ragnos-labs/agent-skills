version: 1
base_branch: main
commands:
  preflight: npm test
  docs_sync: null
  tests: npm test
  gate: npm run lint
  publish_push: git push -u origin HEAD
  publish_pr: gh pr create --fill
  publish_release: null
review:
  critical_paths:
    - src/auth/**
    - src/security/**
    - .github/workflows/**
  mechanical_paths:
    - docs/**
    - tests/**
    - "**/*.md"
  always_review_paths: []
policy:
  require_pr: true
  allow_no_review: true
  use_cache: true
  block_on_warnings: false
docs:
  paths:
    - docs/**
    - "**/*.md"
scanners:
  gitleaks:
    enabled: false
    required: false
    command: null
  semgrep:
    enabled: false
    required: false
    command: null
  actionlint:
    enabled: false
    required: false
    command: null
